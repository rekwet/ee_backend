<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EquityEdge - Instant Stock Analysis Demo</title>
    <style>
        :root {
            --navy: #0a192f;
            --emerald: #10b981;
            --white: #ffffff;
            --light-gray: #f4f6f9;
            --dark-gray: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light-gray);
            color: var(--dark-gray);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .demo-container {
            background: var(--white);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h2 {
            color: var(--navy);
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--navy);
        }

        button {
            background-color: var(--navy);
            color: var(--white);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #112240;
        }

        button:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }

        #resultBox {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            text-align: left;
            display: none;
            white-space: pre-line; /* Keeps simple text formatting clean */
            font-size: 15px;
            line-height: 1.6;
        }

        .loading {
            color: #666;
            font-style: italic;
        }

        .error {
            color: #dc2626;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="demo-container">
    <h2>EquityEdge Live Engine Demo</h2>
    <p class="subtitle">Enter a stock ticker to test our algorithm against real-time value formulas.</p>
    
    <div class="input-group">
        <input type="text" id="tickerInput" placeholder="e.g., AAPL, TSLA, IBM" maxlength="10">
        <button id="analyzeBtn" onclick="runAnalysis()">Analyze</button>
    </div>

    <div id="resultBox"></div>
</div>

<script>
    // ⚠️ REPLACE THIS with your actual Render backend URL
    const BACKEND_URL = "https://ee-backend-y8s2.onrender.com/api/evaluate";

    async function runAnalysis() {
        const tickerInput = document.getElementById('tickerInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resultBox = document.getElementById('resultBox');
        
        const ticker = tickerInput.value.trim().toUpperCase();
        
        if (!ticker) {
            alert("Please enter a stock ticker code.");
            return;
        }

        // Setup loading state
        analyzeBtn.disabled = true;
        resultBox.style.display = "block";
        resultBox.className = "loading";
        resultBox.innerText = `Analyzing ${ticker}... Fetching financial metrics and calculating intrinsic value.`;

        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ ticker: ticker })
            });

            if (!response.ok) {
                throw new Error(`Server returned status ${response.status}`);
            }

            const data = await response.json();
            
            // Format the raw data into clean, readable text strings
            resultBox.className = ""; 
            resultBox.innerText = `
📊 ANALYSIS RESULTS FOR: ${data.ticker} (${data.exchange || 'N/A'})
--------------------------------------------------
• Current Market Price: $${Number(data.current_price).toFixed(2)}
• Calculated Intrinsic Value: $${Number(data.intrinsic_value).toFixed(2)}
• PEG Ratio: ${data.peg_ratio ? Number(data.peg_ratio).toFixed(2) : 'N/A'}
• Market Capitalization: $${(Number(data.market_cap) / 1e9).toFixed(2)}B

--------------------------------------------------
🎯 SCORE & CONCLUSION:
• Total Checklist Score: ${data.total_score}
• Final Verdict: ${data.conclusion.toUpperCase()}
            `;

        } catch (error) {
            resultBox.className = "error";
            resultBox.innerText = `❌ Error analyzing ${ticker}.\nReason: Could not reach the backend engine or process financial data. Make sure your Render backend is awake and CORS is configured.`;
            console.error("Analysis Error:", error);
        } finally {
            analyzeBtn.disabled = false;
        }
    }

    // Allow pressing "Enter" key to trigger analysis
    document.getElementById('tickerInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            runAnalysis();
        }
    });
</script>

</body>
</html>
